name: "Redcon"
description: "Optimize LLM context windows, enforce token budgets, and track cost savings across CI runs."
author: "Redcon"

branding:
  icon: "zap"
  color: "purple"

inputs:
  task:
    description: >
      Natural language description of the task the agent will perform.
      Used to rank which files are most relevant to include in context.
      Defaults to a generic evaluation task if omitted.
    required: false
    default: ""

  repo:
    description: "Path to the repository to analyze (default: current directory)."
    required: false
    default: "."

  policy:
    description: >
      Path to a policy TOML file defining token budgets and quality constraints.
      Example: .github/redcon-policy.toml
    required: false
    default: ""

  max-tokens:
    description: "Maximum token budget for the packed context (default: 128000)."
    required: false
    default: "128000"

  top-files:
    description: "Maximum number of files to include in the packed context (default: 100)."
    required: false
    default: "100"

  strict:
    description: "Fail the step (exit 1) when the policy check fails (default: false)."
    required: false
    default: "false"

  upload-artifacts:
    description: "Upload the JSON run artifact and Markdown report as GitHub Actions artifacts."
    required: false
    default: "true"

  out-prefix:
    description: "Output file prefix for JSON and Markdown artifacts (default: redcon-ci)."
    required: false
    default: "redcon-ci"

  model:
    description: >
      Model name for cost-analysis pricing (default: gpt-4o).
      Run 'redcon cost-analysis --list-models' to see all supported models.
    required: false
    default: "gpt-4o"

  cloud-url:
    description: "Redcon Cloud URL for sending telemetry events (optional)."
    required: false
    default: ""

  cloud-api-key:
    description: "API key for authenticating with Redcon Cloud (optional)."
    required: false
    default: ""

outputs:
  token-estimate:
    description: "Estimated input tokens for the packed context."
    value: ${{ steps.pack.outputs.token_estimate }}

  tokens-saved:
    description: "Tokens saved compared to the full context baseline."
    value: ${{ steps.pack.outputs.tokens_saved }}

  savings-rate:
    description: "Percentage of tokens saved (0-100)."
    value: ${{ steps.pack.outputs.savings_rate }}

  policy-passed:
    description: "'true' if all policy checks passed, 'false' otherwise."
    value: ${{ steps.pack.outputs.policy_passed }}

  dollars-saved:
    description: "Estimated USD saved (based on --model pricing)."
    value: ${{ steps.cost.outputs.dollars_saved }}

  artifact-json:
    description: "Path to the run artifact JSON file."
    value: ${{ steps.pack.outputs.artifact_json }}

  artifact-md:
    description: "Path to the Markdown report."
    value: ${{ steps.pack.outputs.artifact_md }}

runs:
  using: "composite"
  steps:
    - name: Install Redcon
      shell: bash
      run: |
        python -m pip install --quiet --upgrade pip
        python -m pip install --quiet redcon

    - name: Run Redcon pack
      id: pack
      shell: bash
      env:
        INPUT_TASK: ${{ inputs.task }}
        INPUT_REPO: ${{ inputs.repo }}
        INPUT_OUT_PREFIX: ${{ inputs.out-prefix }}
        INPUT_MAX_TOKENS: ${{ inputs.max-tokens }}
        INPUT_TOP_FILES: ${{ inputs.top-files }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_STRICT: ${{ inputs.strict }}
      run: |
        set -euo pipefail

        TASK="${INPUT_TASK}"
        if [[ -z "$TASK" ]]; then
          TASK="evaluate repository context budget"
        fi

        ARGS=(pack "$TASK" --repo "$INPUT_REPO" --out-prefix "$INPUT_OUT_PREFIX")
        ARGS+=(--max-tokens "$INPUT_MAX_TOKENS")
        ARGS+=(--top-files "$INPUT_TOP_FILES")

        if [[ -n "$INPUT_POLICY" && -f "$INPUT_POLICY" ]]; then
          ARGS+=(--policy "$INPUT_POLICY")
        fi

        if [[ "$INPUT_STRICT" == "true" ]]; then
          ARGS+=(--strict)
        fi

        python -m redcon.cli "${ARGS[@]}" 2>&1 | tee /tmp/cb-pack-output.txt || true

        # Parse key metrics from the JSON artifact
        JSON="${INPUT_OUT_PREFIX}.json"
        if [[ -f "$JSON" ]]; then
          TOKEN_ESTIMATE=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); m=d.get('metadata',{}); print(m.get('estimated_input_tokens',0))" "$JSON" 2>/dev/null || echo "0")
          TOKENS_SAVED=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); m=d.get('metadata',{}); print(m.get('estimated_saved_tokens',0))" "$JSON" 2>/dev/null || echo "0")
          BASELINE=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); m=d.get('metadata',{}); print(m.get('baseline_full_context_tokens', int(m.get('estimated_input_tokens',0)) + int(m.get('estimated_saved_tokens',0))))" "$JSON" 2>/dev/null || echo "0")
          if [[ "$BASELINE" -gt 0 ]]; then
            SAVINGS_RATE=$(python3 -c "print(round(int(sys.argv[1])/int(sys.argv[2])*100,1))" "$TOKENS_SAVED" "$BASELINE" 2>/dev/null || echo "0")
          else
            SAVINGS_RATE="0"
          fi
          POLICY_PASSED=$(python3 -c "import json,sys; d=json.load(open(sys.argv[1])); pr=d.get('policy_result'); print('true' if (pr is None or pr.get('passed',True)) else 'false')" "$JSON" 2>/dev/null || echo "true")
        else
          TOKEN_ESTIMATE="0"; TOKENS_SAVED="0"; SAVINGS_RATE="0"; POLICY_PASSED="true"
        fi

        {
          echo "token_estimate=$TOKEN_ESTIMATE"
          echo "tokens_saved=$TOKENS_SAVED"
          echo "savings_rate=$SAVINGS_RATE"
          echo "policy_passed=$POLICY_PASSED"
          echo "artifact_json=${INPUT_OUT_PREFIX}.json"
          echo "artifact_md=${INPUT_OUT_PREFIX}.md"
        } >> "$GITHUB_OUTPUT"

    - name: Generate Markdown report
      id: report
      shell: bash
      continue-on-error: true
      env:
        INPUT_OUT_PREFIX: ${{ inputs.out-prefix }}
        INPUT_POLICY: ${{ inputs.policy }}
      run: |
        set -euo pipefail
        ARGS=(report "${INPUT_OUT_PREFIX}.json" --out "${INPUT_OUT_PREFIX}.report.md")
        if [[ -n "$INPUT_POLICY" && -f "$INPUT_POLICY" ]]; then
          ARGS+=(--policy "$INPUT_POLICY")
        fi
        python -m redcon.cli "${ARGS[@]}"

    - name: Compute cost savings
      id: cost
      shell: bash
      continue-on-error: true
      env:
        INPUT_OUT_PREFIX: ${{ inputs.out-prefix }}
        INPUT_MODEL: ${{ inputs.model }}
      run: |
        set -euo pipefail
        if [[ -f "${INPUT_OUT_PREFIX}.json" ]]; then
          RESULT=$(python -m redcon.cli cost-analysis "${INPUT_OUT_PREFIX}.json" \
            --model "$INPUT_MODEL" --format json 2>/dev/null || echo '{}')
          DOLLARS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(round(d.get('saved_cost_usd',0),4))" 2>/dev/null || echo "0")
          echo "dollars_saved=$DOLLARS" >> "$GITHUB_OUTPUT"
        else
          echo "dollars_saved=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Add GitHub Step Summary
      if: always()
      shell: bash
      env:
        TOKEN_ESTIMATE: ${{ steps.pack.outputs.token_estimate }}
        TOKENS_SAVED: ${{ steps.pack.outputs.tokens_saved }}
        SAVINGS_RATE: ${{ steps.pack.outputs.savings_rate }}
        DOLLARS_SAVED: ${{ steps.cost.outputs.dollars_saved }}
        POLICY_PASSED: ${{ steps.pack.outputs.policy_passed }}
        INPUT_OUT_PREFIX: ${{ inputs.out-prefix }}
      run: |
        {
          echo "## Redcon Results"
          echo ""
          echo "| Metric | Value |"
          echo "|--------|-------|"
          echo "| Token estimate | \`${TOKEN_ESTIMATE}\` |"
          echo "| Tokens saved | \`${TOKENS_SAVED}\` |"
          echo "| Savings rate | \`${SAVINGS_RATE}%\` |"
          echo "| Estimated \$ saved | \`\$${DOLLARS_SAVED}\` |"
          echo "| Policy passed | \`${POLICY_PASSED}\` |"
          echo ""

          REPORT="${INPUT_OUT_PREFIX}.report.md"
          if [[ -f "$REPORT" ]]; then
            echo "---"
            cat "$REPORT"
          elif [[ -f "${INPUT_OUT_PREFIX}.md" ]]; then
            echo "---"
            cat "${INPUT_OUT_PREFIX}.md"
          fi
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Enforce policy result
      if: inputs.strict == 'true'
      shell: bash
      env:
        POLICY_PASSED: ${{ steps.pack.outputs.policy_passed }}
      run: |
        if [[ "$POLICY_PASSED" != "true" ]]; then
          echo "Redcon: policy check FAILED in strict mode."
          exit 1
        fi

    - name: Upload artifacts
      if: inputs.upload-artifacts == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: redcon-artifacts
        path: |
          ${{ inputs.out-prefix }}.json
          ${{ inputs.out-prefix }}.md
          ${{ inputs.out-prefix }}.report.md
        if-no-files-found: warn
