# Redcon PR context audit - generated by `redcon init`
# Runs on every pull request and publishes context growth analysis in the
# job step summary. It used to comment on the PR, but a fresh comment per
# push stacked up as noise, so the audit stays a silent check instead.

name: Redcon PR Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  pr-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Redcon
        run: pip install redcon

      - name: Run PR audit
        run: |
          redcon pr-audit \
            --repo . \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --out-prefix pr-audit

      - name: Publish audit to step summary
        if: always()
        shell: bash
        run: |
          if [[ -f pr-audit.comment.md ]]; then
            cat pr-audit.comment.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "PR audit report was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
