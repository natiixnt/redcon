name: Release

on:
  push:
    tags:
      # Match only canonical semver tags like v1.2.3 - NOT extension tags
      # such as 'vscode-v0.8.0' (handled by a separate publish flow).
      - "v[0-9]*"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the trusted publisher registered on PyPI
    # (owner/repo + release.yml + environment "pypi").
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      # Trusted publishing (OIDC): no API token or password involved.
      # PyPA recommends tracking the release/v1 branch for this action.
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          generate_release_notes: true
          files: dist/*
